<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS | Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <aside class="sidebar-social">
        <a href="https://github.com/" target="_blank" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
        <a href="https://linkedin.com/" target="_blank" aria-label="LinkedIn"><i
                class="fa-brands fa-linkedin-in"></i></a>
        <a href="https://wa.me/5551992951040/" target="_blank" aria-label="WhatsApp"><i
                class="fa-brands fa-whatsapp"></i></a>
        <span class="sidebar-line"></span>
    </aside>

    <nav class="navbar" id="navbar">
        <div class="nav-logo">
            <span class="logo-text">AS</span>
        </div>
        <button class="nav-toggle" id="navToggle" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="#home" data-en="Home" data-pt="Início">Início</a></li>
            <li><a href="#about" data-en="About" data-pt="Sobre mim">Sobre mim</a></li>
            <li><a href="#experience" data-en="Experience" data-pt="Experiências">Experiências</a></li>
            <li><a href="#skills" data-en="Skills" data-pt="Habilidades">Habilidades</a></li>
            <li><a href="#projects" data-en="Projects" data-pt="Projetos">Projetos</a></li>
            <li><a href="#contact" data-en="Contact" data-pt="Contato">Contato</a></li>
            <li class="lang-switcher">
                <button id="langBtn" class="lang-btn">EN</button>
            </li>
        </ul>
    </nav>
    <section class="hero" id="home">
        <canvas id="particleCanvas"></canvas>
        <div class="hero-content">
            <div class="heto-badge">
                <span class="badge-dot"></span>
                <span class="badge-text" data-en="Available for work" data-pt="Disponível para trabalhar">Disponível
                    para trabalhar</span>
                <p class="hero-greeting" data-en="Hi, my name is" data-pt="Olá, meu nome é">Olá, meu nome é</p>
                <h1>Andrei Scola</h1>
                <h2 class="hero-role">
                    <span class="typed-text"></span><span class="typed-cursor"></span>
                </h2>
                <p class="hero-desc"
                    data-en="System Analysis and Development student, ready to make a difference in the IT market."
                    data-pt="Estudante de Análise e Desenvolvimento de Sistemas, disposto a fazer a diferença no mercado de TI.">
                    Estudante de Análise e Desenvolvimento de Sistemas, disposto a fazer a diferença no mercado de TI.
                </p>
                <div class="hero-cta">
                    <a href="#contact" class="btn-primary" data-en="Let's to talk" data-pt="Vamos conversar"></a>
                    <a href="#contact" class="btn-secondary" data-en="See projects" data-pt="Ver projetos"></a>
                </div>
            </div>
        </div>
        <div class="hero-visual">
            <div class="orbit-ring ring-1"></div>
            <div class="orbit-ring ring-2"></div>
            <div class="orbit-ring ring-3"></div>
            <div class="avatar-circle">
                <div class="avatar-placeholder">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
        </div>
        <div class="scroll-hint">
            <span data-en="scroll" data-pt="rolar">rolar</span>
            <i class="fa-solid fa-chevron-down"></i>
        </div>
    </section>

    
</body>

</html>
